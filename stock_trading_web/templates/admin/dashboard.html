    <script>
      window.define = undefined;

        margin-top: 20px;

      .powerbi-report-section h4 {
        margin-bottom: 10px;
      }
      .powerbi-report {

      .export-pdf-btn {

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

          <a class="nav-link" href="{{ url_for('admin_portfolios') }}"

          <a class="nav-link" href="{{ url_for('logout') }}">Đăng xuất</a>
        </div>
      </div>
    </nav>
